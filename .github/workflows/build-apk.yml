name: 编译碎片库 APK

on:
  workflow_dispatch:
  push:
    paths:
      - ".github/workflows/build-apk.yml"

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: 读取仓库
        uses: actions/checkout@v4

      - name: 创建 Android 工程
        shell: bash
        run: |
          set -e
          mkdir -p android-app/app/src/main/java/com/ameameamekite/fragmentvault
          mkdir -p android-app/app/src/main/res/values
          for density in mdpi hdpi xhdpi xxhdpi xxxhdpi; do
            mkdir -p "android-app/app/src/main/res/mipmap-$density"
          done

          cat > android-app/settings.gradle.kts <<'EOF'
          pluginManagement {
              repositories { google(); mavenCentral(); gradlePluginPortal() }
          }
          dependencyResolutionManagement {
              repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS)
              repositories { google(); mavenCentral() }
          }
          rootProject.name = "FragmentVault"
          include(":app")
          EOF

          cat > android-app/build.gradle.kts <<'EOF'
          plugins {
              id("com.android.application") version "8.9.2" apply false
          }
          EOF

          cat > android-app/gradle.properties <<'EOF'
          org.gradle.jvmargs=-Xmx2048m -Dfile.encoding=UTF-8
          android.useAndroidX=true
          android.nonTransitiveRClass=true
          EOF

          cat > android-app/app/build.gradle.kts <<'EOF'
          plugins { id("com.android.application") }

          android {
              namespace = "com.ameameamekite.fragmentvault"
              compileSdk = 35

              defaultConfig {
                  applicationId = "com.ameameamekite.fragmentvault"
                  minSdk = 29
                  targetSdk = 35
                  versionCode = 1
                  versionName = "1.0.0"
              }

              compileOptions {
                  sourceCompatibility = JavaVersion.VERSION_17
                  targetCompatibility = JavaVersion.VERSION_17
              }
          }
          EOF

          cat > android-app/app/src/main/AndroidManifest.xml <<'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <uses-permission android:name="android.permission.INTERNET" />
              <uses-permission android:name="android.permission.ACCESS_NETWORK_STATE" />

              <application
                  android:allowBackup="true"
                  android:icon="@mipmap/ic_launcher"
                  android:roundIcon="@mipmap/ic_launcher"
                  android:label="碎片库"
                  android:theme="@style/AppTheme"
                  android:usesCleartextTraffic="false">
                  <activity
                      android:name=".MainActivity"
                      android:configChanges="keyboardHidden|orientation|screenSize"
                      android:exported="true"
                      android:launchMode="singleTask">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>
                  </activity>
              </application>
          </manifest>
          EOF

          cat > android-app/app/src/main/res/values/styles.xml <<'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <style name="AppTheme" parent="android:style/Theme.Material.NoActionBar">
                  <item name="android:windowBackground">#111117</item>
                  <item name="android:colorAccent">#CDB7FF</item>
                  <item name="android:navigationBarColor">#111117</item>
                  <item name="android:statusBarColor">#111117</item>
                  <item name="android:windowLightStatusBar">false</item>
                  <item name="android:windowLightNavigationBar">false</item>
              </style>
          </resources>
          EOF

          cat > android-app/app/src/main/java/com/ameameamekite/fragmentvault/MainActivity.java <<'EOF'
          package com.ameameamekite.fragmentvault;

          import android.app.Activity;
          import android.content.ContentValues;
          import android.content.Context;
          import android.content.Intent;
          import android.graphics.Color;
          import android.net.Uri;
          import android.os.Bundle;
          import android.os.Environment;
          import android.provider.MediaStore;
          import android.util.Base64;
          import android.webkit.CookieManager;
          import android.webkit.JavascriptInterface;
          import android.webkit.MimeTypeMap;
          import android.webkit.ValueCallback;
          import android.webkit.WebChromeClient;
          import android.webkit.WebResourceRequest;
          import android.webkit.WebSettings;
          import android.webkit.WebView;
          import android.webkit.WebViewClient;
          import android.widget.Toast;

          import java.io.OutputStream;

          public class MainActivity extends Activity {
              private static final String HOME = "https://ameameamekite.github.io/fragment-vault/";
              private static final int FILE_REQUEST = 701;
              private WebView webView;
              private ValueCallback<Uri[]> fileCallback;

              @Override
              protected void onCreate(Bundle state) {
                  super.onCreate(state);
                  getWindow().setStatusBarColor(Color.rgb(17, 17, 23));
                  getWindow().setNavigationBarColor(Color.rgb(17, 17, 23));

                  webView = new WebView(this);
                  webView.setBackgroundColor(Color.rgb(17, 17, 23));
                  setContentView(webView);

                  WebSettings s = webView.getSettings();
                  s.setJavaScriptEnabled(true);
                  s.setDomStorageEnabled(true);
                  s.setDatabaseEnabled(true);
                  s.setAllowContentAccess(true);
                  s.setAllowFileAccess(true);
                  s.setMixedContentMode(WebSettings.MIXED_CONTENT_NEVER_ALLOW);
                  s.setCacheMode(WebSettings.LOAD_DEFAULT);
                  s.setUserAgentString(s.getUserAgentString() + " FragmentVaultAndroid/1.0");

                  CookieManager.getInstance().setAcceptCookie(true);
                  CookieManager.getInstance().setAcceptThirdPartyCookies(webView, false);
                  webView.addJavascriptInterface(new DownloadBridge(this), "FragmentVaultAndroid");

                  webView.setWebChromeClient(new WebChromeClient() {
                      @Override
                      public boolean onShowFileChooser(WebView view, ValueCallback<Uri[]> callback,
                                                       FileChooserParams params) {
                          if (fileCallback != null) fileCallback.onReceiveValue(null);
                          fileCallback = callback;
                          try {
                              Intent intent = params.createIntent();
                              intent.addCategory(Intent.CATEGORY_OPENABLE);
                              intent.putExtra(Intent.EXTRA_ALLOW_MULTIPLE, true);
                              startActivityForResult(Intent.createChooser(intent, "选择图片或备份文件"), FILE_REQUEST);
                              return true;
                          } catch (Exception e) {
                              fileCallback = null;
                              Toast.makeText(MainActivity.this, "暂时打不开文件选择器", Toast.LENGTH_SHORT).show();
                              return false;
                          }
                      }
                  });

                  webView.setWebViewClient(new WebViewClient() {
                      @Override
                      public boolean shouldOverrideUrlLoading(WebView view, WebResourceRequest request) {
                          return navigate(request.getUrl());
                      }

                      @Override
                      public boolean shouldOverrideUrlLoading(WebView view, String url) {
                          return navigate(Uri.parse(url));
                      }

                      @Override
                      public void onPageFinished(WebView view, String url) {
                          super.onPageFinished(view, url);
                          injectNativeHelpers();
                      }
                  });

                  if (state == null) webView.loadUrl(HOME); else webView.restoreState(state);
              }

              private boolean navigate(Uri uri) {
                  if (uri == null) return false;
                  String host = uri.getHost();
                  String path = uri.getPath();
                  boolean home = "ameameamekite.github.io".equalsIgnoreCase(host)
                          && path != null && path.startsWith("/fragment-vault");
                  if (home) return false;
                  if ("http".equalsIgnoreCase(uri.getScheme()) || "https".equalsIgnoreCase(uri.getScheme())) {
                      try { startActivity(new Intent(Intent.ACTION_VIEW, uri)); }
                      catch (Exception e) { Toast.makeText(this, "没有应用能打开它", Toast.LENGTH_SHORT).show(); }
                      return true;
                  }
                  return false;
              }

              private void injectNativeHelpers() {
                  String js = "(function(){"
                          + "['installReadyBanner','installAppBtn','updateReadyBanner'].forEach(function(id){"
                          + "var el=document.getElementById(id);if(el)el.style.display='none';});"
                          + "if(window.__fvNative)return;window.__fvNative=true;"
                          + "document.addEventListener('click',async function(e){"
                          + "var a=e.target.closest&&e.target.closest('a[download]');if(!a)return;"
                          + "var h=a.href||'';if(!h.startsWith('blob:')&&!h.startsWith('data:'))return;"
                          + "e.preventDefault();e.stopPropagation();"
                          + "var n=a.getAttribute('download')||'碎片库导出.json';"
                          + "try{var r=await fetch(h);var b=await r.blob();var fr=new FileReader();"
                          + "fr.onloadend=function(){var x=String(fr.result||'');var i=x.indexOf(',');"
                          + "FragmentVaultAndroid.saveBase64(n,b.type||'application/octet-stream',i>=0?x.slice(i+1):x);};"
                          + "fr.readAsDataURL(b);}catch(err){alert('导出失败，请稍后再试。');}},true);"
                          + "})();";
                  webView.evaluateJavascript(js, null);
              }

              @Override
              protected void onActivityResult(int requestCode, int resultCode, Intent data) {
                  super.onActivityResult(requestCode, resultCode, data);
                  if (requestCode != FILE_REQUEST || fileCallback == null) return;
                  Uri[] result = resultCode == RESULT_OK
                          ? WebChromeClient.FileChooserParams.parseResult(resultCode, data)
                          : null;
                  fileCallback.onReceiveValue(result);
                  fileCallback = null;
              }

              @Override
              protected void onSaveInstanceState(Bundle state) {
                  webView.saveState(state);
                  super.onSaveInstanceState(state);
              }

              @Override
              public void onBackPressed() {
                  if (webView.canGoBack()) webView.goBack(); else super.onBackPressed();
              }

              public static final class DownloadBridge {
                  private final Context context;
                  DownloadBridge(Context context) { this.context = context.getApplicationContext(); }

                  @JavascriptInterface
                  public void saveBase64(String requestedName, String mime, String data) {
                      try {
                          byte[] bytes = Base64.decode(data, Base64.DEFAULT);
                          String name = sanitize(requestedName);
                          if (!name.contains(".")) {
                              String ext = MimeTypeMap.getSingleton().getExtensionFromMimeType(mime);
                              if (ext != null) name += "." + ext;
                          }
                          ContentValues values = new ContentValues();
                          values.put(MediaStore.Downloads.DISPLAY_NAME, name);
                          values.put(MediaStore.Downloads.MIME_TYPE, mime);
                          values.put(MediaStore.Downloads.RELATIVE_PATH,
                                  Environment.DIRECTORY_DOWNLOADS + "/碎片库");
                          values.put(MediaStore.Downloads.IS_PENDING, 1);
                          Uri uri = context.getContentResolver().insert(
                                  MediaStore.Downloads.EXTERNAL_CONTENT_URI, values);
                          if (uri == null) throw new IllegalStateException("无法创建文件");
                          try (OutputStream out = context.getContentResolver().openOutputStream(uri)) {
                              if (out == null) throw new IllegalStateException("无法写入文件");
                              out.write(bytes);
                          }
                          ContentValues done = new ContentValues();
                          done.put(MediaStore.Downloads.IS_PENDING, 0);
                          context.getContentResolver().update(uri, done, null, null);
                          Toast.makeText(context, "已保存到 下载/碎片库", Toast.LENGTH_LONG).show();
                      } catch (Exception e) {
                          Toast.makeText(context, "导出失败：" + e.getMessage(), Toast.LENGTH_LONG).show();
                      }
                  }

                  private static String sanitize(String name) {
                      if (name == null || name.trim().isEmpty()) return "碎片库导出";
                      return name.replaceAll("[\\\\/:*?\"<>|]", "_");
                  }
              }
          }
          EOF

          curl -L --fail \
            "https://raw.githubusercontent.com/ameameamekite/fragment-vault/main/icon-512.png" \
            -o android-app/icon.png
          for density in mdpi hdpi xhdpi xxhdpi xxxhdpi; do
            cp android-app/icon.png "android-app/app/src/main/res/mipmap-$density/ic_launcher.png"
          done

      - name: 设置 Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: 设置 Android SDK
        uses: android-actions/setup-android@v3

      - name: 安装 Android 35
        shell: bash
        run: |
          yes | sdkmanager --licenses >/dev/null
          sdkmanager "platforms;android-35" "build-tools;35.0.0"

      - name: 设置 Gradle
        uses: gradle/actions/setup-gradle@v6
        with:
          gradle-version: "8.11.1"

      - name: 编译 APK
        working-directory: android-app
        run: gradle :app:assembleDebug --stacktrace

      - name: 整理安装包
        shell: bash
        run: |
          cp android-app/app/build/outputs/apk/debug/app-debug.apk \
             "碎片库-安卓App-1.0.0.apk"

      - name: 上传 APK
        uses: actions/upload-artifact@v4
        with:
          name: 碎片库-安卓App
          path: 碎片库-安卓App-1.0.0.apk
          retention-days: 30
