      - name: 保存新版文件到仓库
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "fragment-vault-updater"
          git config user.email "actions@users.noreply.github.com"
          git add index.html sw.js version.json
          if git diff --cached --quiet; then
            echo "仓库里已经是 v7.0.1，不需要重复提交。"
          else
            git commit -m "更新碎片库到 v7.0.1 今日页"
            git push
          fi

      - name: 准备发布目录
        shell: bash
        run: |
          set -euo pipefail
          rm -rf _site
          mkdir -p _site
          cp index.html sw.js version.json _site/
          for file in manifest.webmanifest icon-192.png icon-512.png icon-maskable-512.png; do
            if [ -f "$file" ]; then
              cp "$file" _site/
            fi
          done
          touch _site/.nojekyll

      - name: 配置 GitHub Pages
        uses: actions/configure-pages@v5

      - name: 上传网页文件
        uses: actions/upload-pages-artifact@v4
        with:
          path: _site

  deploy:
    needs: update-and-build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: 发布到 GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
